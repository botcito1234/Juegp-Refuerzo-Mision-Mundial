<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portfolio — Grafo 3D</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#010510; overflow:hidden; font-family:'Segoe UI',system-ui,monospace; display:flex; height:100vh; }

    #sidebar {
      width:250px; min-width:250px; height:100vh;
      background:#010510; border-right:1px solid #162840;
      display:flex; flex-direction:column; overflow:hidden; z-index:10;
    }
    #sb-header { padding:16px 14px 12px; border-bottom:1px solid #162840; flex-shrink:0; }
    #sb-header h1 { font-size:15px; color:#63b3ed; margin-bottom:3px; }
    #sb-header .sub { font-size:10px; color:#1e3a50; }

    #btn-all {
      margin:10px 12px 4px; padding:8px 12px;
      background:#0a1828; border:1px solid #1a3a60;
      border-radius:7px; color:#63b3ed; font-size:12px; cursor:pointer;
      text-align:center; flex-shrink:0;
    }
    #btn-all.active { background:#0d2040; border-color:#63b3ed; }
    #sep { border-top:1px solid #0f2030; margin:4px 0; flex-shrink:0; }

    #proj-list { flex:1; overflow-y:auto; padding:2px 0 8px; }
    #proj-list::-webkit-scrollbar { width:3px; }
    #proj-list::-webkit-scrollbar-thumb { background:#1a3050; border-radius:2px; }

    .pi { display:flex; align-items:center; gap:9px; padding:8px 12px; cursor:pointer; border-left:3px solid transparent; }
    .pi:hover { background:#0a1828; }
    .pi.sel { background:#0d2035; }
    .pi-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .pi-body { flex:1; min-width:0; }
    .pi-name { font-size:12px; color:#8aaabb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pi-meta { font-size:9px; color:#1e3a50; margin-top:1px; }
    .pi-n { font-size:10px; color:#1a3040; flex-shrink:0; }

    #sb-info { padding:12px 13px; border-top:1px solid #0f2030; flex-shrink:0; min-height:95px; font-size:11px; color:#1a3050; }
    .si-stack { font-size:9px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .si-name  { font-size:13px; color:#ddeeff; font-weight:bold; margin-bottom:4px; }
    .si-desc  { font-size:10px; color:#1e3a50; line-height:1.5; }
    .si-stat  { font-size:10px; color:#1a3040; margin-top:6px; }

    #main { flex:1; height:100vh; position:relative; overflow:hidden; }
    #graph { position:absolute; top:0; left:0; width:100%; height:100%; }

    #loading {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      z-index:20; color:#63b3ed; font-size:13px; text-align:center;
      background:rgba(1,4,18,.97); padding:22px 32px; border-radius:10px;
      border:1px solid #1a3060; min-width:300px;
    }
    #status-line { font-size:11px; color:#1e4060; margin-top:8px; }
    #err-box { font-size:11px; color:#e05050; margin-top:10px; display:none; line-height:1.6; }
    #hint { position:absolute; bottom:14px; right:14px; z-index:5; background:rgba(1,4,18,.88); border:1px solid #0f2030; border-radius:8px; padding:7px 13px; color:#1a3050; font-size:10px; line-height:1.9; }
    #mbadge { position:absolute; top:14px; right:14px; z-index:5; background:rgba(1,4,18,.9); border:1px solid #1a3060; border-radius:6px; padding:5px 12px; font-size:11px; color:#63b3ed; }
    .dot{display:inline-block;animation:bk 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bk{0%,80%,100%{opacity:.15}40%{opacity:1}}
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sb-header">
    <h1>&#127760; Portfolio</h1>
    <div class="sub">17 proyectos &middot; Knowledge Graph</div>
  </div>
  <div id="btn-all" class="active" onclick="showAll()">&#128193; Todos los proyectos</div>
  <div id="sep"></div>
  <div id="proj-list"></div>
  <div id="sb-info"><span style="color:#1a3050">Selecciona un proyecto para ver detalles</span></div>
</div>

<div id="main">
  <div id="loading">
    Cargando librer&iacute;as 3D<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    <div id="status-line">Iniciando THREE.js...</div>
    <div id="err-box"></div>
  </div>
  <div id="mbadge">&#127760; Todos los proyectos</div>
  <div id="hint">Arrastrar: rotar &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Clic: ver proyecto</div>
  <div id="graph"></div>
</div>

<!-- ① PRIMERO: definir todas las funciones que usan onload -->
<script>
/* Status helpers */
function setStatus(msg) {
  var el = document.getElementById('status-line');
  if (el) el.innerHTML = msg;
}
function showErr(msg) {
  var el = document.getElementById('err-box');
  if (el) { el.innerHTML = msg; el.style.display = 'block'; }
  setStatus('');
}
/* Capturar TODOS los errores de script */
window.addEventListener('error', function(ev) {
  showErr('Error en script: <b>' + ev.message + '</b><br>Archivo: ' + (ev.filename||'?') + ':' + ev.lineno);
}, true);

/* ── PALETTE ── */
var SC = {
  'React/TS':    '#4a9ede',
  'Next.js':     '#38bdf8',
  'TS Fullstack':'#818cf8',
  'TS Monorepo': '#c084fc',
  'Python':      '#f5c518',
  'Flutter':     '#4caf50',
  'Electron':    '#fb923c',
  'React':       '#22d3ee',
};

/* ── DATA ── */
var PROJECTS = [
  {id:"p1",  stack:"React/TS",     nodes:220,  edges:430,   name:"Misión Mundial",        desc:"Juego de matemáticas · 5 mundos · 30 niveles"},
  {id:"p2",  stack:"TS Fullstack", nodes:555,  edges:1044,  name:"Math Adventure",        desc:"Aventura matemática multijugador en tiempo real"},
  {id:"p3",  stack:"Next.js",      nodes:1171, edges:2468,  name:"SIFED Front",           desc:"Plataforma educativa institucional · Next.js 14"},
  {id:"p4",  stack:"Next.js",      nodes:636,  edges:1233,  name:"Asistencia Ágora",      desc:"Control de asistencia laboral con QR y nómina"},
  {id:"p5",  stack:"Flutter",      nodes:432,  edges:1209,  name:"Calendario Personal",   desc:"Agenda personal con voz · Flutter / Dart"},
  {id:"p6",  stack:"TS Monorepo",  nodes:8002, edges:9265,  name:"ChatBot",               desc:"Sistema de chatbot con IA · Monorepo TypeScript"},
  {id:"p7",  stack:"Next.js",      nodes:396,  edges:786,   name:"Control 3D",            desc:"Control de inventario para impresión 3D"},
  {id:"p8",  stack:"Electron",     nodes:385,  edges:789,   name:"Control Actividades",   desc:"Gestión de actividades · Electron + React"},
  {id:"p9",  stack:"Next.js",      nodes:313,  edges:756,   name:"Control de Notas",      desc:"Sistema de calificaciones escolares · IA"},
  {id:"p10", stack:"Next.js",      nodes:147,  edges:255,   name:"Control Gastos",        desc:"Control de gastos personal · Supabase"},
  {id:"p11", stack:"Python",       nodes:359,  edges:1065,  name:"Crear Sesiones",        desc:"Generador de sesiones pedagógicas con IA"},
  {id:"p12", stack:"Next.js",      nodes:608,  edges:1419,  name:"Inventario 3D",         desc:"Sistema de inventario · caja · productos"},
  {id:"p13", stack:"React/TS",     nodes:374,  edges:633,   name:"Juego Mundial",         desc:"Juego educativo multimundo · React / TS"},
  {id:"p14", stack:"React",        nodes:67,   edges:113,   name:"Página CUbo",           desc:"Visualizador 3D interactivo de cubo geométrico"},
  {id:"p15", stack:"React",        nodes:218,  edges:375,   name:"Página Nexora",         desc:"Landing page agencia web · animaciones 3D"},
  {id:"p16", stack:"Python",       nodes:102,  edges:241,   name:"Reconocimiento Dedo",   desc:"Reconocimiento de gestos · Gemini AI + MediaPipe"},
  {id:"p17", stack:"TS Fullstack", nodes:4262, edges:10083, name:"Sistema Colegio",       desc:"ERP escolar completo · NestJS + React"},
];

var PKG = {
  p1: ["components","store","hooks","config","utils"],
  p2: ["client","server"],
  p3: ["plataforma","api","portal","home","modules"],
  p4: ["components","actions","app","lib","middleware"],
  p5: ["data","features","core","services","widgets"],
  p6: ["api","web"],
  p7: ["app","components","hooks","lib","schema"],
  p8: ["components","activities","backup","db","App"],
  p9: ["app","lib","components","middleware","schema"],
  p10:["app","components","context","lib"],
  p11:["src","web"],
  p12:["dashboard","actions","queries","shared","ui"],
  p13:["screens","store","utils","components","data"],
  p14:["components","App"],
  p15:["components","pages","utils","layouts"],
  p16:["sidebar","config","drawing_canvas","main","ai_integration"],
  p17:["back","front","reports"],
};

var HOT = {
  p1: [{n:"useAudio",fi:6,pk:2},{n:"useSpeech",fi:4,pk:2},{n:"goTo",fi:4,pk:1}],
  p2: [{n:"create",fi:13,pk:1},{n:"update",fi:10,pk:1},{n:"buildRanking",fi:5,pk:1}],
  p3: [{n:"showToast",fi:41,pk:4},{n:"cn",fi:40,pk:4},{n:"getStorageUrl",fi:35,pk:1}],
  p4: [{n:"createClient",fi:50,pk:3},{n:"cn",fi:21,pk:0},{n:"formatDate",fi:7,pk:3}],
  p5: [{n:"today",fi:2,pk:2},{n:"start",fi:2,pk:3},{n:"_base",fi:1,pk:2}],
  p6: [{n:"cn",fi:24,pk:1},{n:"update",fi:15,pk:0},{n:"handleSubmit",fi:9,pk:1}],
  p7: [{n:"cn",fi:22,pk:3},{n:"createClient",fi:13,pk:3},{n:"formatCurrency",fi:9,pk:3}],
  p8: [{n:"get",fi:26,pk:3},{n:"listar",fi:11,pk:1},{n:"evidenceDir",fi:8,pk:3}],
  p9: [{n:"createClient",fi:28,pk:1},{n:"Card",fi:16,pk:2},{n:"registrarAuditoria",fi:13,pk:1}],
  p10:[{n:"useAuth",fi:9,pk:2},{n:"PieChart",fi:2,pk:1},{n:"formatDate",fi:2,pk:0}],
  p11:[{n:"_log",fi:10,pk:0},{n:"get_api_key",fi:9,pk:0},{n:"_now",fi:9,pk:0}],
  p12:[{n:"createClient",fi:35,pk:1},{n:"cn",fi:29,pk:4},{n:"formatCurrency",fi:11,pk:3}],
  p13:[{n:"setPhase",fi:11,pk:1},{n:"shuffle",fi:3,pk:2},{n:"formatTime",fi:3,pk:2}],
  p14:[{n:"stopWaterAnim",fi:6,pk:1},{n:"togglePart",fi:3,pk:1},{n:"Scene",fi:1,pk:0}],
  p15:[{n:"getWhatsAppLink",fi:10,pk:2},{n:"prefersReducedMotion",fi:4,pk:2},{n:"onScroll",fi:4,pk:0}],
  p16:[{n:"save",fi:5,pk:1},{n:"show_ai_error",fi:2,pk:0},{n:"init_ui",fi:2,pk:2}],
  p17:[{n:"findOne",fi:42,pk:0},{n:"httpJson",fi:33,pk:1},{n:"get",fi:29,pk:0}],
};

/* ── BUILD DATA ── */
var ALL_NODES = [], ALL_LINKS = [], stackOf = {};
PROJECTS.forEach(function(p) {
  stackOf[p.id] = p.stack;
  ALL_NODES.push({ id:p.id, name:p.name, label:'Project', stack:p.stack, nodes:p.nodes, edges:p.edges, desc:p.desc });
  (PKG[p.id]||[]).forEach(function(nm,i) {
    var kid = p.id+'_k'+i;
    ALL_NODES.push({ id:kid, name:nm, label:'Package', project:p.id });
    ALL_LINKS.push({ source:p.id, target:kid, type:'CONTAINS' });
  });
  (HOT[p.id]||[]).forEach(function(h,j) {
    var hid = p.id+'_h'+j;
    ALL_NODES.push({ id:hid, name:h.n, label:'Hotspot', project:p.id, fanIn:h.fi });
    ALL_LINKS.push({ source:p.id+'_k'+h.pk, target:hid, type:'HOTSPOT' });
  });
});

/* ── HELPERS ── */
function colorOf(n) { return SC[n.stack||stackOf[n.project]] || '#4a9ede'; }
function sizeOf(n) {
  if (n.label==='Project') return 14 + Math.log2((n.nodes||1)+1)*2.5;
  if (n.label==='Package') return 5;
  return 3.5 + Math.log2((n.fanIn||1)+1)*1.2;
}
function makeSprite(text, color) {
  var T = window.THREE; if (!T) return null;
  var cv = document.createElement('canvas');
  cv.width=1024; cv.height=128;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,1024,128);
  ctx.shadowColor='#000000'; ctx.shadowBlur=16;
  ctx.fillStyle=color;
  ctx.font='bold 42px Segoe UI,Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text, 512, 64);
  var tex=new T.CanvasTexture(cv);
  tex.needsUpdate=true;
  var sp=new T.Sprite(new T.SpriteMaterial({map:tex,transparent:true,depthWrite:false,sizeAttenuation:true}));
  sp.scale.set(80, 13, 1);
  return sp;
}

function nodeColorOf(n) {
  if (n.label==='Hotspot') return '#ffcc00';
  return SC[n.stack||stackOf[n.project]] || '#4a9ede';
}
function hexToInt(h) {
  return parseInt(h.replace('#',''), 16);
}

/* ── SIDEBAR ── */
var activeId = null;
(function buildSidebar() {
  var list = document.getElementById('proj-list');
  PROJECTS.forEach(function(p) {
    var c = SC[p.stack]||'#aaa';
    var el = document.createElement('div');
    el.className='pi'; el.dataset.pid=p.id;
    el.innerHTML='<div class="pi-dot" style="background:'+c+'"></div>'+
      '<div class="pi-body"><div class="pi-name">'+p.name+'</div><div class="pi-meta">'+p.stack+'</div></div>'+
      '<div class="pi-n">'+p.nodes.toLocaleString()+'</div>';
    el.addEventListener('click', function(){ selectProj(p.id); });
    list.appendChild(el);
  });
})();

/* ── GRAPH INIT — called by second script onload ── */
var Graph;
function initGraph() {
  try {
    var fgType = typeof window.ForceGraph3D;
    if (fgType !== 'function') {
      showErr('ForceGraph3D no disponible. Tipo=' + fgType);
      return;
    }
    setStatus('Construyendo grafo 3D...');
    var container = document.getElementById('graph');

    Graph = ForceGraph3D()(container)
      .backgroundColor('#010510')
      .showNavInfo(false)
      .nodeLabel(function(n) {
        var c=colorOf(n);
        if (n.label==='Project') return '<div style="background:#01040f;border:1px solid '+c+';border-radius:8px;padding:8px 12px;color:#ddeeff;font-size:12px;max-width:230px">'+
          '<div style="color:'+c+';font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">'+n.stack+'</div>'+
          '<div style="font-size:14px;font-weight:bold;margin-bottom:4px">'+n.name+'</div>'+
          '<div style="color:#2a4a60;font-size:11px">'+n.desc+'</div>'+
          '<div style="margin-top:5px;color:#1a3040;font-size:10px">'+n.nodes.toLocaleString()+' nodos &middot; '+n.edges.toLocaleString()+' aristas</div></div>';
        if (n.label==='Hotspot') return '<div style="background:#01040f;border:1px solid #3a2800;border-radius:6px;padding:5px 9px;color:#f5c518;font-size:11px"><b>'+n.name+'</b> fan-in '+n.fanIn+'</div>';
        return '<div style="background:#01040f;border:1px solid #0f2030;border-radius:6px;padding:5px 9px;color:#4a7090;font-size:11px">'+n.name+'</div>';
      })
      .nodeVal(function(n){ return sizeOf(n); })
      .nodeThreeObjectExtend(false)
      .nodeThreeObject(function(n){
        var T=window.THREE; if(!T) return null;
        var c=nodeColorOf(n), ci=hexToInt(c), sz=sizeOf(n);
        var g=new T.Group();

        if (n.label==='Project') {
          /* Esfera principal brillante */
          g.add(new T.Mesh(
            new T.SphereGeometry(sz,24,24),
            new T.MeshBasicMaterial({color:ci})
          ));
          /* Halo exterior semitransparente */
          g.add(new T.Mesh(
            new T.SphereGeometry(sz*1.45,16,16),
            new T.MeshBasicMaterial({color:ci,transparent:true,opacity:.1})
          ));
          /* Anillo */
          var ring=new T.Mesh(
            new T.TorusGeometry(sz*1.9,sz*0.09,4,40),
            new T.MeshBasicMaterial({color:ci,transparent:true,opacity:.55})
          );
          ring.rotation.x=Math.PI/2; g.add(ring);
          /* Etiqueta flotante */
          var sp=makeSprite(n.name,c);
          if(sp){sp.position.set(0,sz*2+6,0);g.add(sp);}

        } else if (n.label==='Hotspot') {
          /* Núcleo amarillo brillante */
          g.add(new T.Mesh(
            new T.SphereGeometry(sz,16,16),
            new T.MeshBasicMaterial({color:0xffcc00})
          ));
          /* Glow naranja */
          g.add(new T.Mesh(
            new T.SphereGeometry(sz*2,12,12),
            new T.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:.12})
          ));

        } else {
          /* Package */
          g.add(new T.Mesh(
            new T.SphereGeometry(sz,12,12),
            new T.MeshBasicMaterial({color:ci,transparent:true,opacity:.85})
          ));
        }
        return g;
      })
      .linkColor(function(l){ return l.type==='CONTAINS'?'#4488cc':'#cc8800'; })
      .linkOpacity(0.8)
      .linkWidth(function(l){ return l.type==='CONTAINS'?1.5:.8; })
      .linkDirectionalParticles(function(l){ return l.type==='HOTSPOT'?3:0; })
      .linkDirectionalParticleWidth(1.8)
      .linkDirectionalParticleColor(function(){ return '#ffcc00'; })
      .linkDirectionalParticleSpeed(.006)
      .onNodeClick(function(n){
        if (n.label==='Project') selectProj(n.id);
        else { Graph.centerAt(n.x,n.y,n.z,600); Graph.zoom(8,600); }
      })
      .graphData({ nodes:ALL_NODES, links:ALL_LINKS });

    setStatus('Simulando f&iacute;sica (~20 seg)...');

    Graph.d3Force('charge').strength(function(n){
      return n.label==='Project'?-400:n.label==='Package'?-60:-25;
    });
    Graph.d3Force('link')
      .distance(function(l){ return l.type==='CONTAINS'?55:22; })
      .strength(function(l){ return l.type==='CONTAINS'?.95:.8; });

    /* Estrellas */
    var T3 = window.THREE;
    if (T3) {
      var sg=new T3.BufferGeometry();
      var pos=new Float32Array(9000);
      for(var i=0;i<9000;i++) pos[i]=(Math.random()-.5)*6000;
      sg.setAttribute('position',new T3.BufferAttribute(pos,3));
      Graph.scene().add(new T3.Points(sg,
        new T3.PointsMaterial({color:0x334466,size:1.5,transparent:true,opacity:.7})
      ));
    }

    Graph.onEngineStop(function(){
      document.getElementById('loading').style.display='none';
      Graph.zoomToFit(400, 20);
      setTimeout(function(){
        var p = Graph.cameraPosition();
        var dist = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
        var factor = 0.38;
        Graph.cameraPosition(
          { x: p.x*factor, y: p.y*factor, z: p.z*factor },
          { x:0, y:0, z:0 },
          1200
        );
      }, 600);
    });

    window.addEventListener('resize', function(){
      Graph.width(container.clientWidth).height(container.clientHeight);
    });

  } catch(e) {
    showErr('Error: ' + e.message);
  }
}

/* ── SELECTION ── */
function showAll() {
  activeId=null;
  document.querySelectorAll('.pi').forEach(function(el){el.classList.remove('sel');});
  document.getElementById('btn-all').classList.add('active');
  document.getElementById('mbadge').textContent='Todos los proyectos';
  document.getElementById('sb-info').innerHTML='<span style="color:#1a3050">Mostrando todos los proyectos</span>';
  if(!Graph) return;
  Graph.graphData({nodes:ALL_NODES,links:ALL_LINKS});
  Graph.d3Force('charge').strength(function(n){ return n.label==='Project'?-1100:n.label==='Package'?-140:-55; });
  Graph.d3Force('link').distance(function(l){ return l.type==='CONTAINS'?115:42; });
  setTimeout(function(){ Graph.zoomToFit(900,80); },700);
}

function selectProj(pid) {
  var p=null;
  for(var i=0;i<PROJECTS.length;i++){ if(PROJECTS[i].id===pid){p=PROJECTS[i];break;} }
  if(!p) return;
  activeId=pid;
  var c=SC[p.stack]||'#63b3ed';
  document.querySelectorAll('.pi').forEach(function(el){ el.classList.toggle('sel',el.dataset.pid===pid); });
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('mbadge').innerHTML='<span style="color:'+c+'">&#9679;</span> '+p.name;
  document.getElementById('sb-info').innerHTML=
    '<div class="si-stack" style="color:'+c+'">'+p.stack+'</div>'+
    '<div class="si-name">'+p.name+'</div>'+
    '<div class="si-desc">'+p.desc+'</div>'+
    '<div class="si-stat">'+p.nodes.toLocaleString()+' nodos &nbsp;&middot;&nbsp; '+p.edges.toLocaleString()+' aristas</div>';
  if(!Graph) return;
  var myNodes=ALL_NODES.filter(function(n){ return n.id===pid||n.project===pid; });
  var myIds={};
  myNodes.forEach(function(n){ myIds[n.id]=true; });
  var myLinks=ALL_LINKS.filter(function(l){
    var s=typeof l.source==='object'?l.source.id:l.source;
    var t=typeof l.target==='object'?l.target.id:l.target;
    return myIds[s]&&myIds[t];
  });
  Graph.graphData({nodes:myNodes,links:myLinks});
  Graph.d3Force('charge').strength(function(n){ return n.label==='Project'?-320:n.label==='Package'?-220:-90; });
  Graph.d3Force('link').distance(function(l){ return l.type==='CONTAINS'?130:60; });
  setTimeout(function(){ Graph.zoomToFit(700,60); },600);
}
</script>
